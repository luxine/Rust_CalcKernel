name: native ckc release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Attach artifacts to the matching GitHub Release"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --check
      - run: cargo clippy --all-targets --all-features --locked -- -D warnings
      - run: cargo test --locked
      - run: cargo build --release --locked
      - run: ./target/release/ckc --help
      - run: |
          smoke_file="$(mktemp "${RUNNER_TEMP}/ckc-smoke.XXXXXX.ck")"
          cat > "${smoke_file}" <<'CK'
          export fn add(a: i32, b: i32) -> i32 {
            return a + b;
          }
          CK
          ./target/release/ckc check "${smoke_file}"
          ./target/release/ckc emit-mir "${smoke_file}" -O3

  build-artifacts:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-15
            binary: ckc-darwin-arm64
            archive: ckc-darwin-arm64.tar.gz
            executable: target/release/ckc
          - target: darwin-x64
            runner: macos-15-intel
            binary: ckc-darwin-x64
            archive: ckc-darwin-x64.tar.gz
            executable: target/release/ckc
          - target: linux-arm64
            runner: ubuntu-24.04-arm
            binary: ckc-linux-arm64
            archive: ckc-linux-arm64.tar.gz
            executable: target/release/ckc
          - target: linux-x64
            runner: ubuntu-24.04
            binary: ckc-linux-x64
            archive: ckc-linux-x64.tar.gz
            executable: target/release/ckc
          - target: win32-arm64
            runner: windows-11-arm
            binary: ckc-win32-arm64.exe
            archive: ckc-win32-arm64.zip
            executable: target/release/ckc.exe
          - target: win32-x64
            runner: windows-2025
            binary: ckc-win32-x64.exe
            archive: ckc-win32-x64.zip
            executable: target/release/ckc.exe
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release --locked
      - run: ${{ matrix.executable }} --help
      - run: |
          smoke_file="$(mktemp "${RUNNER_TEMP}/ckc-smoke.XXXXXX.ck")"
          cat > "${smoke_file}" <<'CK'
          export fn add(a: i32, b: i32) -> i32 {
            return a + b;
          }
          CK
          "${{ matrix.executable }}" check "${smoke_file}"
          "${{ matrix.executable }}" emit-mir "${smoke_file}" -O3
      - run: |
          mkdir -p dist
          cp "${{ matrix.executable }}" "dist/${{ matrix.binary }}"
          if [[ "${{ matrix.archive }}" == *.zip ]]; then
            powershell -NoProfile -Command "Compress-Archive -Path 'dist/${{ matrix.binary }}' -DestinationPath 'dist/${{ matrix.archive }}' -Force"
          else
            tar -czf "dist/${{ matrix.archive }}" -C dist "${{ matrix.binary }}"
          fi
          shasum -a 256 "dist/${{ matrix.archive }}" > "dist/${{ matrix.archive }}.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: native-ckc-${{ matrix.target }}
          path: |
            dist/${{ matrix.archive }}
            dist/${{ matrix.archive }}.sha256
          if-no-files-found: error

  publish-release:
    needs: build-artifacts
    if: startsWith(github.ref, 'refs/tags/') || inputs.publish == true
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: native-ckc-*
          path: release-artifacts
          merge-multiple: true
      - run: gh release upload "${GITHUB_REF_NAME}" release-artifacts/* --clobber
        env:
          GH_TOKEN: ${{ github.token }}
