name: npm release artifact

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish the signed-off tarball to npm"
        required: true
        default: false
        type: boolean
      typescript_oracle_repository:
        description: "GitHub repository for the read-only TypeScript CalcKernel oracle"
        required: true
        default: "luxine/CalcKernel"
        type: string
      typescript_oracle_ref:
        description: "Git ref for the TypeScript CalcKernel oracle"
        required: true
        default: "main"
        type: string

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: "24"

jobs:
  verify-release-scripts:
    runs-on: ubuntu-24.04
    env:
      CALCKERNEL_TS_ROOT: ${{ github.workspace }}/typescript-oracle
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: actions/checkout@v4
        with:
          repository: ${{ inputs.typescript_oracle_repository }}
          ref: ${{ inputs.typescript_oracle_ref }}
          path: typescript-oracle
          token: ${{ secrets.TYPESCRIPT_ORACLE_TOKEN || github.token }}
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
        working-directory: typescript-oracle
      - run: pnpm build
        working-directory: typescript-oracle
      - run: npm run verify:typescript-oracle
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --check
      - run: cargo clippy --all-targets --all-features --locked -- -D warnings
      - run: cargo test
      - run: cargo test --test npm_cutover_evidence_test --test npm_declaration_parity_test --test npm_host_install_smoke_test --test npm_public_api_parity_test --test npm_publish_artifact_test --test npm_publish_result_test --test npm_registry_replacement_test --test npm_release_signoff_test --test npm_release_workflow_test --test typescript_cutover_docs_test --test typescript_test_surface_audit_test
      - run: node scripts/audit-rust-replacement-readiness.mjs
      - run: node scripts/audit-typescript-test-surface.mjs
      - run: node scripts/verify-declaration-parity.mjs
      - run: node scripts/verify-public-api-parity.mjs
      - run: node scripts/audit-npm-release-workflow.mjs

  build-binary:
    needs: verify-release-scripts
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            rust-target: aarch64-apple-darwin
            runner: macos-15
            binary: ckc-darwin-arm64
          - target: darwin-x64
            rust-target: x86_64-apple-darwin
            runner: macos-15-intel
            binary: ckc-darwin-x64
          - target: linux-arm64
            rust-target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            binary: ckc-linux-arm64
          - target: linux-x64
            rust-target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            binary: ckc-linux-x64
          - target: win32-arm64
            rust-target: aarch64-pc-windows-msvc
            runner: windows-11-arm
            binary: ckc-win32-arm64.exe
          - target: win32-x64
            rust-target: x86_64-pc-windows-msvc
            runner: windows-2025
            binary: ckc-win32-x64.exe
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}
      - run: npm run build:npm-matrix -- --target ${{ matrix.target }} --out build/npm-binaries
      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: build/npm-binaries/${{ matrix.binary }}
          if-no-files-found: error

  pack-release:
    needs: build-binary
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: build/npm-binaries
          merge-multiple: true
      - run: ls -la build/npm-binaries
      - run: npm run build:npm-matrix -- --verify-staged --expect-complete --out build/npm-binaries
      - run: mkdir -p dist
      - run: CKC_NPM_BINARIES_DIR=build/npm-binaries npm pack --json --pack-destination dist > pack.json
      - run: |
          TARBALL="$(node -p "JSON.parse(require('fs').readFileSync('pack.json', 'utf8'))[0].filename")"
          npm run verify:npm-release -- "dist/${TARBALL}" > release-manifest.json
      - uses: actions/upload-artifact@v4
        with:
          name: release-tarball
          path: dist/*.tgz
          if-no-files-found: error
      - uses: actions/upload-artifact@v4
        with:
          name: release-manifest
          path: release-manifest.json
          if-no-files-found: error

  platform-signoff:
    needs: pack-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            rust-target: aarch64-apple-darwin
            runner: macos-15
            binary: ckc-darwin-arm64
          - target: darwin-x64
            rust-target: x86_64-apple-darwin
            runner: macos-15-intel
            binary: ckc-darwin-x64
          - target: linux-arm64
            rust-target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            binary: ckc-linux-arm64
          - target: linux-x64
            rust-target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            binary: ckc-linux-x64
          - target: win32-arm64
            rust-target: aarch64-pc-windows-msvc
            runner: windows-11-arm
            binary: ckc-win32-arm64.exe
          - target: win32-x64
            rust-target: x86_64-pc-windows-msvc
            runner: windows-2025
            binary: ckc-win32-x64.exe
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: actions/download-artifact@v4
        with:
          name: release-tarball
          path: dist
      - uses: actions/download-artifact@v4
        with:
          name: release-manifest
          path: release-manifest
      - run: mkdir -p signoffs
      - run: |
          TARBALL="dist/$(node -p "JSON.parse(require('fs').readFileSync('release-manifest/release-manifest.json', 'utf8')).tarball")"
          test -s "${TARBALL}"
          npm run verify:host-npm-install -- "${TARBALL}" > signoffs/${{ matrix.target }}.json
      - uses: actions/upload-artifact@v4
        with:
          name: signoff-${{ matrix.target }}
          path: signoffs/${{ matrix.target }}.json
          if-no-files-found: error

  finalize-signoff:
    needs: platform-signoff
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: actions/download-artifact@v4
        with:
          name: release-manifest
          path: release
      - uses: actions/download-artifact@v4
        with:
          pattern: signoff-*
          path: signoffs
          merge-multiple: true
      - run: npm run verify:release-signoff -- release/release-manifest.json signoffs > release-signoff.json
      - uses: actions/upload-artifact@v4
        with:
          name: release-signoff
          path: release-signoff.json
          if-no-files-found: error

  publish-npm:
    needs: finalize-signoff
    if: ${{ inputs.publish }}
    runs-on: ubuntu-24.04
    environment: npm-production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: "https://registry.npmjs.org"
      - uses: actions/download-artifact@v4
        with:
          name: release-tarball
          path: dist
      - uses: actions/download-artifact@v4
        with:
          name: release-manifest
          path: release-manifest
      - uses: actions/download-artifact@v4
        with:
          name: release-signoff
          path: release
      - run: test -s release/release-signoff.json
      - run: npm run verify:publish-artifact -- release-manifest/release-manifest.json dist > npm-publish-artifact.json
      - run: |
          TARBALL="dist/$(node -p "JSON.parse(require('fs').readFileSync('release-manifest/release-manifest.json', 'utf8')).tarball")"
          npm publish "${TARBALL}" --provenance --access public --json > npm-publish.json
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - run: npm run verify:registry-replacement -- "$(node -p "require('./package.json').version")" > npm-registry-replacement.json
      - run: npm run verify:publish-result -- release-manifest/release-manifest.json npm-publish.json npm-registry-replacement.json > npm-publish-result.json
      - run: npm run verify:cutover-evidence -- release-manifest/release-manifest.json release/release-signoff.json npm-publish-artifact.json npm-publish-result.json > npm-cutover-evidence.json
      - uses: actions/upload-artifact@v4
        with:
          name: npm-publish
          path: |
            npm-publish-artifact.json
            npm-publish.json
            npm-registry-replacement.json
            npm-publish-result.json
            npm-cutover-evidence.json
          if-no-files-found: error
